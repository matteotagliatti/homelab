---
name: homelab
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/sonarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/radarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "7878:7878"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/bazarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "6767:6767"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/prowlarr-config:/config:z
    ports:
      - "9696:9696"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    ports:
      - "8191:8191"
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/jellyfin-config:/config:z
      - ${DATA_DIR}/data/media:/data:z
    ports:
      - "8096:8096"
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    environment:
      - LOG_LEVEL=${SEERR_LOG_LEVEL:-info}
      - TZ=${TIMEZONE}
    ports:
      - "5055:5055"
    volumes:
      - ${CONFIG_DIR}/seerr-config:/app/config:z
    depends_on:
      - jellyfin
      - sonarr
      - radarr
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR}/qbittorrent-config:/config:z
      - ${DATA_DIR}/data/torrents:/data/torrents:z
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  homer:
    image: b4bz/homer:latest
    container_name: homer
    user: "${PUID}:${PGID}"
    environment:
      - INIT_ASSETS=1
      - TZ=${TIMEZONE}
    volumes:
      - ${HOMELAB_DIR}/homer:/www/assets:z
    ports:
      - "8081:8080"
    restart: unless-stopped

  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web-automated
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - HARDCOVER_TOKEN=${HARDCOVER_TOKEN:-}
      - NETWORK_SHARE_MODE=false
      - CWA_PORT_OVERRIDE=8083
    volumes:
      - ${CONFIG_DIR}/cwa-config:/config:z
      - ${DATA_DIR}/data/books/ingest:/cwa-book-ingest:z
      - ${DATA_DIR}/data/books/library:/calibre-library:z
    ports:
      - "8083:8083"
    restart: unless-stopped

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/shelfmark-config:/config:z
      - ${DATA_DIR}/data/books/ingest:/books:z
      # Uncomment after CWA first run to reuse its user database for login:
      # - ${CONFIG_DIR}/cwa-config/app.db:/auth/app.db:ro
    ports:
      - "8084:8084"
    depends_on:
      - calibre-web-automated
    restart: unless-stopped
