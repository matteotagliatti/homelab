---
name: homelab
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/sonarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/radarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "7878:7878"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/bazarr-config:/config:z
      - ${DATA_DIR}/data:/data:z
    ports:
      - "6767:6767"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/prowlarr-config:/config:z
    ports:
      - "9696:9696"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    ports:
      - "8191:8191"
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_DIR}/jellyfin-config:/config:z
      - ${DATA_DIR}/data/media:/data:z
    ports:
      - "8096:8096"
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR}/qbittorrent-config:/config:z
      - ${DATA_DIR}/data/torrents:/data/torrents:z
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  homer:
    image: b4bz/homer:latest
    container_name: homer
    user: "${PUID}:${PGID}"
    environment:
      - INIT_ASSETS=1
      - TZ=${TIMEZONE}
    volumes:
      - ${HOMELAB_DIR}/homer:/www/assets:z
    ports:
      - "8081:8080"
    restart: unless-stopped

  caddy:
    build: ${HOMELAB_DIR}/caddy
    container_name: caddy
    user: "${PUID}:${PGID}"
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN}
      - HOMELAB_HOST=${HOMELAB_HOST}
      - ACME_EMAIL=${ACME_EMAIL}
      - VERCEL_API_TOKEN=${VERCEL_API_TOKEN}
      - TZ=${TIMEZONE}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ${HOMELAB_DIR}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ${CONFIG_DIR}/caddy-data:/data:z
      - ${CONFIG_DIR}/caddy-config:/config:z
    restart: unless-stopped
